name: flutter_technical_task_rightware_llc
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.8
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^9.1.1
  quickalert: ^1.1.0
  flutter_secure_storage: ^10.0.0
  equatable: ^2.0.8
  dio: ^5.9.1
  pretty_dio_logger: ^1.4.0
  go_router: ^17.1.0
  get_it: ^9.2.1
  envied: ^1.3.3
  json_annotation: ^4.11.0
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  envied_generator: ^1.3.3
  build_runner: ^2.11.1
  json_serializable: ^6.13.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lang/en.json
    - assets/lang/ar.json

  fonts:
    - family: myFont
      fonts:
        - asset: assets/fonts/jannah.ttf